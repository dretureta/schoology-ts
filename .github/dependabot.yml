version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    # Solo crear PRs, no hacer merge automático
    # El equipo decide si.mergear manualmente
    group:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
